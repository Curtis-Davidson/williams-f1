<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WF1 AD User Review</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<h1>WF1 AD User Review Portal</h1>
<form method="POST">
    <label for="report_select">Select a User Report:</label>
    <select id="report_select" name="report_select">
        <option value="" disabled selected>-- Choose a report --</option>
        {% for rpt in reports %}
        <option value="{{ rpt }}" {% if rpt == selected %}selected{% endif %}>{{ rpt }}</option>
        {% endfor %}
    </select>
    <button type="submit">Load</button>
</form>

{% if selected %}
<h2>Report: {{ selected }}</h2>
<div id="json-data">
    <h3>Raw JSON Data</h3>
    <pre>{{ data_json | tojson(indent=2) }}</pre>
</div>
<div id="md-data">
    <h3>Markdown Rendered</h3>
    <div class="markdown-content">{{ data_md | safe }}</div>
</div>
{% endif %}
</body>
</html>
