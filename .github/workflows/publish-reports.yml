  convert-md-to-pdf:
    name: Convert Markdown to PDF
    runs-on: ubuntu-latest
    needs: deploy-to-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Convert .md to .pdf
        run: |
          mkdir -p WF1GPODiscovery/PDFs
          for f in WF1GPODiscovery/Results/*.md; do
            out="WF1GPODiscovery/PDFs/$(basename "$f" .md).pdf"
            pandoc "$f" -o "$out" --pdf-engine=xelatex
          done

      - name: Commit and push PDFs
        run: |
          git config user.name "GPO Bot"
          git config user.email "actions@github.com"
          git add WF1GPODiscovery/PDFs/*.pdf
          git commit -m "Auto-generate PDF reports from markdown"
          git push
